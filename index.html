<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skelly Company</title>

    <style>
        body {
            margin: 0;
            background-color: #808080;
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        h1 {
            color: black;
            text-align: center;
            margin: 20px 0 0 0;
            font-size: 2rem;
        }

        .button-container {
            height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .channel-btn {
            padding: 18px 36px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background-color: #ff0000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .channel-btn:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>Welcome to the beta version of Skelly Company's website!</h1>

    <div class="button-container">
        <a href="https://www.youtube.com/@real_skellyAC" target="_blank" rel="noopener noreferrer">
            <button class="channel-btn">
                Check out my channel!
            </button>
        </a>
    </div>

</body>
</html>
