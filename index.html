<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skelly Company</title>

    <style>
        body {
            margin: 0;
            background-color: #808080;
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        h1 {
            color: black;
            text-align: center;
            margin: 20px 0 0 0;
            font-size: 2rem;
        }

        .button-container {
            height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        a {
            text-decoration: none;
        }

        .channel-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 36px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background-color: #ff0000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .channel-btn:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }

        .yt-icon {
            width: 28px;
            height: 28px;
        }
    </style>
</head>
<body>

    <h1>Welcome to the beta version of Skelly Company's website!</h1>

    <div class="button-container">
        <a href="https://www.youtube.com/@real_skellyAC" target="_blank" rel="noopener noreferrer">
            <button class="channel-btn">
                
                <!-- YouTube Icon -->
                <svg class="yt-icon" viewBox="0 0 24 24" fill="white">
                    <path d="M23.498 6.186a2.997 2.997 0 0 0-2.112-2.12C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.386.566A2.997 2.997 0 0 0 .502 6.186 31.2 31.2 0 0 0 0 12a31.2 31.2 0 0 0 .502 5.814 2.997 2.997 0 0 0 2.112 2.12C4.5 20.5 12 20.5 12 20.5s7.5 0 9.386-.566a2.997 2.997 0 0 0 2.112-2.12A31.2 31.2 0 0 0 24 12a31.2 31.2 0 0 0-.502-5.814zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/>
                </svg>

                Check out my channel!
            </button>
        </a>
    </div>

</body>
</html>
